# Black One Dark (custom)
# Pure black background with the One Dark ANSI palette, plus explicit
# tab bar / border / selection / mark colors so the whole UI stays in sync.
# Note: `kitten themes` will overwrite this file — re-apply from git if so.

foreground #b8bfc9
background #000000

# Selection: inverse-style, readable on any content
selection_foreground #000000
selection_background #61afef

# Aqua block cursor (kept from previous config)
cursor #00ffff
cursor_text_color #000000

url_color #56b6c2

# Window (pane) borders
active_border_color #61afef
inactive_border_color #2a2e36
bell_border_color #e06c75

# Tab bar — explicit so tabs are always visible on black
tab_bar_background #000000
tab_bar_margin_color #000000
active_tab_foreground #000000
active_tab_background #61afef
inactive_tab_foreground #9098a5
inactive_tab_background #1d212a

# Marks (kitty_mod+m highlights)
mark1_foreground #000000
mark1_background #61afef
mark2_foreground #000000
mark2_background #c678dd
mark3_foreground #000000
mark3_background #56b6c2

# black
color0 #3f4451
color8 #4f5666

# red
color1 #e06c75
color9 #ff7b86

# green
color2 #98c379
color10 #b1e18b

# yellow
color3 #d19a66
color11 #efb074

# blue
color4 #61afef
color12 #67cdff

# magenta
color5 #c678dd
color13 #e48bff

# cyan
color6 #56b6c2
color14 #63d4e0

# white
color7 #e6e6e6
